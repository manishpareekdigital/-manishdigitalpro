<svg width="600" height="150" viewBox="0 0 600 150" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brand" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
  </defs>
  
  <!-- Minimalist M + Growth Arrow Icon -->
  <g transform="translate(30, 25)">
    <!-- Left Leg and Middle V -->
    <path d="M25 85 L25 45 L50 70 L75 45 L75 85" stroke="url(#brand)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right Leg Extension -->
    <path d="M75 45 L75 25" stroke="url(#brand)" stroke-width="12" stroke-linecap="round"/>
    <!-- Arrow Head on Top Right -->
    <path d="M55 40 L75 20 L95 40" stroke="url(#brand)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Company Name -->
  <text x="160" y="85" font-family="'Inter', system-ui, -apple-system, sans-serif" font-weight="800" font-size="48" fill="#ffffff" letter-spacing="-1">Manish Digital</text>
  
  <!-- Tagline -->
  <text x="165" y="120" font-family="'Inter', system-ui, -apple-system, sans-serif" font-weight="600" font-size="16" fill="#94a3b8" letter-spacing="3">GROWING BUSINESSES DIGITALLY</text>
</svg>
